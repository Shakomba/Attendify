services:
  backend:
    environment:
      DEMO_MODE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,https://app.shakomba.org"
      CPU_FACE_DETECT_MODEL: "hog"

  # Frontend uses https://api.shakomba.org (from docker-compose.yml) so it works
  # from any device (PC, phone, Cloudflare tunnel) — not just localhost.
