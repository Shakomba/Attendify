services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ams_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_TCP_PORT: "1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - ams_net

  # Run once to initialize schema:
  # docker compose --profile db-init up sql-init
  sql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: ams_sql_init
    profiles: ["db-init"]
    depends_on:
      - sqlserver
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - ./database:/scripts:ro
    command: >
      /bin/bash -lc "
      set -e;
      for i in {1..60}; do
        /opt/mssql-tools/bin/sqlcmd -S sqlserver,1433 -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" && break;
        echo 'Waiting for SQL Server...';
        sleep 5;
      done;
      /opt/mssql-tools/bin/sqlcmd -S sqlserver,1433 -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -i /scripts/01_init_schema.sql;
      echo 'Schema init completed.';
      "
    networks:
      - ams_net

  backend:
    container_name: ams_backend
    restart: unless-stopped
    runtime: nvidia
    image: ams_backend_gpu:latest
    depends_on:
      - sqlserver
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      CORS_ORIGINS: "https://attendify.tech"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      SQL_DRIVER: "ODBC Driver 18 for SQL Server"
      SQL_SERVER: "sqlserver"
      SQL_PORT: "1433"
      SQL_DATABASE: ${SQL_DATABASE:-AttendanceAI}
      SQL_USER: "sa"
      SQL_PASSWORD: ${MSSQL_SA_PASSWORD}
      SQL_TRUST_SERVER_CERT: "yes"

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: "/usr/local/cuda/lib64"
      AI_MODE: "gpu"
      GPU_COSINE_THRESHOLD: ${GPU_COSINE_THRESHOLD:-0.55}
      RECOGNITION_FRAME_STRIDE: ${RECOGNITION_FRAME_STRIDE:-1}
      RECOGNITION_EVENT_COOLDOWN_SEC: ${RECOGNITION_EVENT_COOLDOWN_SEC:-20}
      ENROLLMENT_POSE_DISTANCE_THRESHOLD: "0.06"

      ANTISPOOF_ENABLED: "${ANTISPOOF_ENABLED:-true}"
      ANTISPOOF_LIVE_THRESHOLD: ${ANTISPOOF_LIVE_THRESHOLD:-0.55}
      ANTISPOOF_WINDOW_FRAMES: ${ANTISPOOF_WINDOW_FRAMES:-6}
      ANTISPOOF_REQUIRED_LIVE_FRAMES: ${ANTISPOOF_REQUIRED_LIVE_FRAMES:-4}
      ANTISPOOF_TRACK_TTL_SEC: ${ANTISPOOF_TRACK_TTL_SEC:-8.0}

      WEBAUTHN_RP_ID: "attendify.tech"
      WEBAUTHN_ORIGIN: "https://attendify.tech"
      WEBAUTHN_RP_NAME: "Attendify"

      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Attendify <no-reply@attendify.tech>}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_DRY_RUN: ${SMTP_DRY_RUN:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_API_URL: ${RESEND_API_URL:-https://api.resend.com/emails}
      RESEND_TIMEOUT_SEC: ${RESEND_TIMEOUT_SEC:-15}
      FRONTEND_URL: ${FRONTEND_URL:-https://attendify.tech}
    volumes:
      - insightface_models:/root/.insightface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks:
      - ams_net

  frontend:
    container_name: ams_frontend
    restart: unless-stopped
    build:
      context: .
      args:
        VITE_API_BASE_URL: https://api.attendify.tech
      dockerfile_inline: |
        FROM node:20-alpine AS build
        WORKDIR /app
        COPY frontend/package*.json ./
        RUN npm ci --legacy-peer-deps
        COPY frontend/. .
        ARG VITE_API_BASE_URL
        ENV VITE_API_BASE_URL=$$VITE_API_BASE_URL
        RUN npm run build

        FROM nginx:1.27-alpine
        COPY --from=build /app/dist /usr/share/nginx/html
        EXPOSE 80
    depends_on:
      - backend
    networks:
      - ams_net

  nginx:
    image: nginx:1.27-alpine
    container_name: ams_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - ams_net

  certbot:
    image: certbot/certbot
    container_name: ams_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  mssql_data:
  insightface_models:
  certbot_www:
  certbot_certs:

networks:
  ams_net:
    driver: bridge
